nameOverride: ""
fullnameOverride: ""

image:
  repository: drumsergio/lynxprompt
  pullPolicy: IfNotPresent
  tag: "2.0.75"

imagePullSecrets: []

replicaCount: 1

service:
  type: ClusterIP
  port: 3000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: lynxprompt.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

auth:
  existingSecret: ""
  nextauthSecret: ""
  superadminEmail: ""

app:
  url: "http://localhost:3000"
  name: "LynxPrompt"
  logoUrl: ""
  contactEmail: ""
  statusPageUrl: ""
  platformOwnerEmail: ""
  enableUserRegistration: "true"
  enableEmailAuth: "true"
  enablePasskeys: "true"
  enableGithubOauth: "false"
  enableGoogleOauth: "false"
  enableTurnstile: "false"
  enableSso: "false"
  enableAi: "false"
  enableBlog: "false"
  enableSupportForum: "false"
  enableFederation: "true"
  federationRegistryUrl: "https://lynxprompt.com"

oauth:
  github:
    clientId: ""
    clientSecret: ""
  google:
    clientId: ""
    clientSecret: ""

turnstile:
  siteKey: ""
  secretKey: ""

analytics:
  umamiScriptUrl: ""
  websiteId: ""

smtp:
  host: ""
  port: "587"
  user: ""
  password: ""
  from: "noreply@localhost"
  fromName: "LynxPrompt"

ai:
  anthropicApiKey: ""
  model: "claude-3-5-haiku-latest"

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "17-alpine"
  auth:
    username: lynxprompt
    password: ""
    database: lynxprompt
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

externalDatabase:
  host: ""
  port: 5432
  user: ""
  password: ""
  database: ""
  ssl:
    enabled: false
    rejectUnauthorized: true

waitForDatabase:
  enabled: true
  image: busybox:1.36.1
  timeoutSeconds: 300

persistence:
  uploads:
    enabled: true
    existingClaim: ""
    size: 5Gi
    accessModes:
      - ReadWriteOnce
    storageClass: ""

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    memory: 2Gi

startupProbe:
  enabled: true
  httpGet:
    path: /api/health
    port: http
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

livenessProbe:
  enabled: true
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

podSecurityContext:
  fsGroup: 1001
  runAsNonRoot: true
  runAsUser: 1001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

serviceAccount:
  create: true
  annotations: {}
  name: ""

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

podAnnotations: {}
podLabels: {}

extraEnv: []
extraEnvFrom: []
extraVolumes: []
extraVolumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
