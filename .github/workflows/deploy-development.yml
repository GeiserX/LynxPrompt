name: Deploy to Development

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-development
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Development
    runs-on: [self-hosted, linux, x64, geiserback]
    environment:
      name: development
      url: https://dev.lynxprompt.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          VERSION="dev-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Building version: $VERSION"

      - name: Log into Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        run: |
          docker buildx build --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ secrets.NEXT_PUBLIC_UMAMI_WEBSITE_ID }} \
            --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }} \
            --build-arg APP_URL=https://dev.lynxprompt.com \
            -t drumsergio/lynxprompt:${{ steps.version.outputs.version }} \
            -t drumsergio/lynxprompt:dev-latest \
            --push .

      - name: Update geiserback docker-compose
        run: |
          cd /tmp
          rm -rf geiserback-deploy
          GIT_CRED_HELPER='!f() { echo "username=${{ secrets.GITEA_USERNAME }}"; echo "password=${{ secrets.GITEA_TOKEN }}"; }; f'
          git -c credential.helper="$GIT_CRED_HELPER" clone http://192.168.10.100:3010/giteaer/geiserback.git geiserback-deploy
          cd geiserback-deploy
          git config credential.helper "$GIT_CRED_HELPER"

          # Update image tag
          sed -i 's|image: drumsergio/lynxprompt:.*|image: drumsergio/lynxprompt:${{ steps.version.outputs.version }}|' lynxprompt-dev/docker-compose.yml

          # Commit and push (triggers webhook auto-deploy)
          git config user.email "github-actions@lynxprompt.com"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "deploy: update lynxprompt-dev to ${{ steps.version.outputs.version }}" || echo "No changes"
          git push origin main

          cd /tmp && rm -rf geiserback-deploy

      - name: Health check
        run: |
          sleep 30
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dev.lynxprompt.com/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ App is responding"
              break
            fi
            echo "Waiting for site to be healthy... (attempt $i/10, status: $STATUS)"
            sleep 10
            if [ "$i" = "10" ]; then
              echo "⚠️ Health check timed out - site may still be starting"
              exit 0
            fi
          done

          HEALTH=$(curl -sf https://dev.lynxprompt.com/api/health)
          echo "Health: $HEALTH"
          echo "$HEALTH" | jq -e '.status == "ok" and .db == "connected"' > /dev/null || {
            echo "⚠️ DB not connected"
            exit 0
          }

          CONFIG=$(curl -sf https://dev.lynxprompt.com/api/config/public)
          echo "Config: $CONFIG"
          echo "$CONFIG" | jq -e '.enableEmailAuth != null and .appName != null' > /dev/null || {
            echo "⚠️ Public config unexpected shape"
            exit 0
          }

          HOME_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dev.lynxprompt.com/)
          if [ "$HOME_STATUS" = "200" ]; then
            echo "✅ Homepage returns 200"
          else
            echo "⚠️ Homepage returned $HOME_STATUS"
          fi

          echo "✅ Development deployment verified"
