name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'packages/**'
      - 'prisma/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'next.config.*'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'packages/**'
      - 'prisma/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'next.config.*'
      - '.github/workflows/ci.yml'

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma clients
        run: npm run db:generate
        env:
          DATABASE_URL_APP: "postgresql://mock:mock@localhost:5432/mock"
          DATABASE_URL_USERS: "postgresql://mock:mock@localhost:5432/mock"
          DATABASE_URL_BLOG: "postgresql://mock:mock@localhost:5432/mock"
          DATABASE_URL_SUPPORT: "postgresql://mock:mock@localhost:5432/mock"

      - name: Type check
        run: npm run typecheck

      # TODO: Re-enable once eslint-config-next@16 FlatCompat circular structure bug is fixed
      # See: https://github.com/vercel/next.js/issues — FlatCompat + ESLint 9 crash
      # - name: Lint
      #   run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma clients
        run: npm run db:generate
        env:
          DATABASE_URL_APP: "postgresql://mock:mock@localhost:5432/mock"
          DATABASE_URL_USERS: "postgresql://mock:mock@localhost:5432/mock"
          DATABASE_URL_BLOG: "postgresql://mock:mock@localhost:5432/mock"
          DATABASE_URL_SUPPORT: "postgresql://mock:mock@localhost:5432/mock"

      - name: Run tests
        run: npm test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          flags: unittests
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma clients
        run: npm run db:generate
        env:
          DATABASE_URL_APP: "postgresql://mock:mock@localhost:5432/mock"
          DATABASE_URL_USERS: "postgresql://mock:mock@localhost:5432/mock"
          DATABASE_URL_BLOG: "postgresql://mock:mock@localhost:5432/mock"
          DATABASE_URL_SUPPORT: "postgresql://mock:mock@localhost:5432/mock"

      - name: Build application
        run: npm run build
        env:
          # Disable telemetry during build
          NEXT_TELEMETRY_DISABLED: 1
          # Mock environment for build
          DATABASE_URL_APP: "postgresql://mock:mock@localhost:5432/mock"
          DATABASE_URL_USERS: "postgresql://mock:mock@localhost:5432/mock"
          DATABASE_URL_BLOG: "postgresql://mock:mock@localhost:5432/mock"
          DATABASE_URL_SUPPORT: "postgresql://mock:mock@localhost:5432/mock"
          NEXTAUTH_SECRET: "build-time-secret-not-used"
          NEXTAUTH_URL: "http://localhost:3000"

  integration-smoke:
    name: Integration Smoke Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    continue-on-error: true
    steps:
      - name: Health endpoint
        run: |
          RESPONSE=$(curl -sf --max-time 15 https://dev.lynxprompt.com/api/health 2>&1) || {
            echo "⚠️ dev.lynxprompt.com unreachable - skipping smoke tests"
            exit 0
          }
          echo "$RESPONSE"
          echo "$RESPONSE" | jq -e '.status == "ok" and .db == "connected"' > /dev/null
          echo "✅ Health endpoint OK"

      - name: Public config endpoint
        run: |
          RESPONSE=$(curl -sf --max-time 15 https://dev.lynxprompt.com/api/config/public 2>&1) || exit 0
          echo "$RESPONSE" | jq -e '.enableEmailAuth != null and .appName != null and .appUrl != null' > /dev/null
          echo "✅ Public config endpoint OK"

      - name: Homepage returns 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://dev.lynxprompt.com/) || exit 0
          if [ "$STATUS" != "200" ]; then
            echo "❌ Homepage returned $STATUS"
            exit 1
          fi
          echo "✅ Homepage returns 200"

      - name: Login page returns 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://dev.lynxprompt.com/auth/signin) || exit 0
          if [ "$STATUS" != "200" ]; then
            echo "❌ Login page returned $STATUS"
            exit 1
          fi
          echo "✅ Login page returns 200"

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ All checks passed"
