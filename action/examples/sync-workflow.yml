# LynxPrompt Sync — Ready-to-use GitHub Actions workflow
#
# Copy this file to your repository at:
#   .github/workflows/lynxprompt-sync.yml
#
# Setup:
# 1. Create an API token at https://lynxprompt.com/settings?tab=api-tokens
#    (or your self-hosted instance)
# 2. Add it as a repository secret named LYNXPROMPT_TOKEN
#    (Settings → Secrets and variables → Actions → New repository secret)
# 3. Push to main — the action will find all AI config files and sync them.
#
# That's it. No other configuration needed.
# Monorepos are supported — all paths use ** to match any depth.

name: Sync AI configs to LynxPrompt

on:
  push:
    branches: [main, master]
    paths:
      # Popular
      - '**/AGENTS.md'
      - '**/CLAUDE.md'
      - '**/.cursor/rules/**'
      - '**/.github/copilot-instructions.md'
      - '**/.windsurfrules'
      # IDEs
      - '**/GEMINI.md'
      - '**/.zed/instructions.md'
      - '**/.void/config.json'
      - '**/.trae/rules/**'
      - '**/.idx/**'
      # Editor extensions
      - '**/.clinerules'
      - '**/.roo/rules/**'
      - '**/.continue/config.json'
      - '**/.cody/config.json'
      - '**/.tabnine.yaml'
      - '**/.supermaven/config.json'
      - '**/.codegpt/config.json'
      - '**/.amazonq/rules/**'
      - '**/.augment/rules/**'
      - '**/.kilocode/rules/**'
      - '**/.junie/guidelines.md'
      - '**/.kiro/steering/**'
      # CLI tools
      - '**/AIDER.md'
      - '**/.goosehints'
      - '**/WARP.md'
      - '**/opencode.json'
      # Other
      - '**/.openhands/microagents/repo.md'
      - '**/CRUSH.md'
      - '**/firebender.json'
      # Slash commands
      - '**/.cursor/commands/**'
      - '**/.claude/commands/**'
      - '**/.windsurf/workflows/**'
      - '**/.copilot/prompts/**'
      - '**/.continue/prompts/**'
      - '**/.opencode/commands/**'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  sync:
    name: Sync to LynxPrompt
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync AI configs
        uses: GeiserX/LynxPrompt/action@main
        with:
          token: ${{ secrets.LYNXPROMPT_TOKEN }}
          # Uncomment and change for self-hosted instances:
          # api-url: 'https://lynxprompt.your-domain.com'
          # Visibility for new blueprints (PRIVATE, TEAM, or PUBLIC):
          # visibility: 'PRIVATE'
